name: Add SLA Comment to Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  add-sla-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add SLA comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const slaMessage = `
            Thank you for submitting this issue. Our team is committed to providing timely responses:
            
            - Initial response: Within 24 hours
            - Status update: Every 48 hours
            - Resolution target: Within 5 business days
            
            We appreciate your patience as we work to address your concern.
            `;
            
            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: issueNumber,
              body: slaMessage
            });
